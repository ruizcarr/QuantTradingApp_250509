name: Trading Alert

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 9:00 CEST (summer UTC+2) Mon-Fri
    - cron: '0 8 * * 1-5'  # 9:00 CET  (winter UTC+1) Mon-Fri
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Skip time check (for testing)'
        type: boolean
        default: false

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Madrid time is 9:00
        id: time_check
        run: |
          python -c "
          import datetime, pytz, sys
          force = '${{ github.event.inputs.force_run }}' == 'true'
          if force:
              print('Force run enabled ✅ skipping time check')
              sys.exit(0)
          tz = pytz.timezone('Europe/Madrid')
          now = datetime.datetime.now(tz)
          print(f'Current Madrid time: {now.strftime(\"%H:%M\")}')
          if now.hour != 9:
              print('Not 9:00 CET/CEST — skipping.')
              sys.exit(1)
          else:
              print('Time check passed ✅')
          "

      - name: Run trading bot
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python trading_bot.py 2>&1
name: Trading Alert

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 8:00 CEST (summer UTC+2) Mon-Fri
    - cron: '0 7 * * 1-5'  # 8:00 CET  (winter UTC+1) Mon-Fri
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Skip time check (for testing)'
        type: boolean
        default: false

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Madrid time
        id: time_check
        run: |
          python -c "
          import datetime, pytz
          force = '${{ github.event.inputs.force_run }}' == 'true'
          tz = pytz.timezone('Europe/Madrid')
          now = datetime.datetime.now(tz)
          print(f'Current Madrid time: {now.strftime(\"%H:%M\")}')
          if force or now.hour == 8:
              print('Logic works properly. Sending message now.')
              print('should_run=true')
          else:
              print('Logic works properly. Summer time trigger aborted - winter time message comes in one hour.')
              print('should_run=false')
          " >> $GITHUB_OUTPUT

      - name: Run trading bot
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python trading_bot.py 2>&1
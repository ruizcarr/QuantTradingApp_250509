name: Trading Alert

on:
  schedule:
    - cron: '0 19 * * 1-5'  # 21:00 CEST (summer UTC+2) Mon-Fri
    - cron: '0 20 * * 1-5'  # 21:00 CET  (winter UTC+1) Mon-Fri
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Skip time check (for testing)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Madrid time
        id: time_check
        run: |
          python -c "
          import datetime, pytz
          force = '${{ github.event.inputs.force_run }}' == 'true'
          tz = pytz.timezone('Europe/Madrid')
          now = datetime.datetime.now(tz)
          time_str = now.strftime('%H:%M')
          print('Current Madrid time: ' + time_str)
          if force or now.hour == 21:
              print('Logic works properly. Sending message now.')
              result = 'true'
          else:
              print('Logic works properly. Summer time trigger aborted.')
              result = 'false'
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('should_run=' + result + '\n')
          "

      - name: Run trading bot
        if: steps.time_check.outputs.should_run == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python trading_bot.py 2>&1